<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live | Riccardo Pastrone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="unito.html">UniTO</a>
            <a href="live.html" class="active">Twitch</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contacts</a>
        </div>
        <button id="theme-toggle" class="theme-btn">
            <span id="theme-icon">🌙</span> Dark Theme
        </button>
    </nav>

    <main class="page-container">
        <div class="content reveal">
            
            <div style="font-size: 0.85rem; font-weight: 700; color: var(--text-color); letter-spacing: 1px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <div style="width: 10px; height: 10px; background: #FF3B30; border-radius: 50%; box-shadow: 0 0 12px rgba(255, 59, 48, 0.8); animation: blink 2s infinite;"></div>
                STREAMING STATUS
            </div>
            
            <h1 style="font-size: 3.5rem; margin-bottom: 0.5rem;">Come To Say Hi!</h1>
            <p>Hit the follow button and support the channel!</p>

            <div class="card" style="padding: 0; overflow: hidden; margin-top: 3rem; border-radius: 24px;">
                <div style="aspect-ratio: 16/9; width: 100%;">
                    <iframe
                        src="https://player.twitch.tv/?channel=codingwithpastro&parent=pastroo.github.io"
                        height="100%"
                        width="100%"
                        style="border: none;"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="card" style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1.5rem; text-align: left;">
                <div>
                    <h3 style="font-size: 1.5rem; margin-bottom: 0.2rem;">Watch on the app!</h3>
                    <p style="margin: 0; font-size: 1rem;">Support the channel writing something in the chat!</p>
                </div>
                <a href="https://www.twitch.tv/codingwithpastro" target="_blank" class="btn twitch-btn">
                    Open on Twitch ↗
                </a>
            </div>

        </div>
    </main>

    <footer class="site-footer reveal">
        <div class="hud-data">
            &copy; 2026 Riccardo Pastrone
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
