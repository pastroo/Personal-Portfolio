<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTO - Riccardo Pastrone</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    
    <div class="ios-gradient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <header class="site-header">
            <a href="index.html" class="brand-logo">RP.</a>
            <nav>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="unito.html" class="active">UniTO</a>
                    <a href="live.html">Live</a>
                    <a href="about.html">About</a>
                    <a href="contact.html">Contact</a>
                </div>
            </nav>
            <button class="theme-toggle" aria-label="Cambia tema">
                <svg class="sun-and-moon" aria-hidden="true" width="24" height="24" viewBox="0 0 24 24">
                    <mask class="moon" id="moon-mask-proj">
                        <rect x="0" y="0" width="100%" height="100%" fill="white" />
                        <circle cx="24" cy="10" r="6" fill="black" />
                    </mask>
                    <circle class="sun" cx="12" cy="12" r="6" mask="url(#moon-mask-proj)" fill="currentColor" />
                </svg>
            </button>
        </header>

        <main id="unito-app">
            <div style="margin-bottom: 60px;">
                <div id="unito-breadcrumb" class="hud-data" style="cursor:pointer;" onclick="resetUniToView()">Archivio</div>
                <h1 id="unito-title">UniTO.</h1>
            </div>

            <div id="view-years" class="bento-grid view-section">
                <div class="bento-card" onclick="openYear('Primo Anno')">
                    <div class="card-icon-wrapper">🎓</div>
                    <div class="hud-data">Informatica</div>
                    <h3 class="card-title">Primo Anno</h3>
                    <p>Seleziona per vedere i semestri</p>
                </div>
                <div class="bento-card" onclick="openYear('Secondo Anno')">
                    <div class="card-icon-wrapper">💻</div>
                    <div class="hud-data">Informatica</div>
                    <h3 class="card-title">Secondo Anno</h3>
                    <p>Seleziona per vedere i semestri</p>
                </div>
                <div class="bento-card" onclick="openYear('Terzo Anno')">
                    <div class="card-icon-wrapper">🚀</div>
                    <div class="hud-data">Informatica</div>
                    <h3 class="card-title">Terzo Anno</h3>
                    <p>Seleziona per vedere i semestri</p>
                </div>
            </div>

            <div id="view-semesters" class="bento-grid view-section" style="display: none;"></div>
            <div id="view-subjects" class="bento-grid view-section" style="display: none;"></div>
            <div id="view-labs" class="bento-grid view-section" style="display: none;"></div>
            <div id="view-files" class="view-section" style="display: none;"></div>
        </main> 
    </div>
</body>
</html>
