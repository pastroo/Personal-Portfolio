        <section style="text-align: center; margin-bottom: 60px;">
            <h1>Stay in contact</h1>
            <p>Have you got an idea? Answer will be delivered within 24 hours.</p>
        </section>

        <main class="bento-grid">
            <div class="bento-card span-2">
                <div class="hud-data">
                    <div class="hud-dot" style="background: #FF3B30;"></div>
                    <span>SEND ME AN E-MAIL</span>
                </div>
                <h2 class="card-title">Let's Talk!</h2>
                
                <form action="#" method="POST" style="margin-top: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <input type="text" placeholder="Your Name" class="form-input" required>
                        <input type="email" placeholder="Your E-Mail" class="form-input" required>
                    </div>
                    <input type="text" placeholder="Subject" class="form-input" required>
                    <textarea placeholder="Tell me whatever you want" class="form-textarea" required></textarea>
                    <button type="submit" class="btn-apple" style="width: 100%;">Send Message &rarr;</button>
                </form>
            </div>
